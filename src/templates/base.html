<!DOCTYPE html>
<html lang="en" data-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Outfitd — AI-powered personal styling for men">
    <title>{% block title %}{{ page_title | default('Outfitd') }}{% endblock %} — Outfitd</title>

    <!-- Pico CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">

    <!-- Google Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@400;600;700&display=swap"
        rel="stylesheet">

    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            /* Ultramodern Premium Palette */
            --trunk-bg: #050507;
            --trunk-bg-secondary: #0D0D12;
            --trunk-bg-tertiary: #14141A;
            --trunk-accent: #E2C08D;
            /* Sophisticated Champagne Gold */
            --trunk-accent-hover: #F2D2A3;
            --trunk-accent-subtle: rgba(226, 192, 141, 0.06);
            --trunk-accent-glow: rgba(226, 192, 141, 0.15);
            --trunk-border: rgba(255, 255, 255, 0.05);
            --trunk-border-glow: rgba(226, 192, 141, 0.25);

            --trunk-text-primary: #F4F4F5;
            --trunk-text-secondary: #A1A1AA;
            --trunk-text-tertiary: #52525B;

            /* Status Colors */
            --trunk-wildcard: #FF8F8F;
            --trunk-wildcard-bg: rgba(255, 143, 143, 0.08);
            --trunk-purchase: #93C5FD;
            --trunk-skip: #71717A;
            --trunk-keep: #86EFAC;
            --trunk-return: #E2C08D;

            /* Radii & Shadows */
            --trunk-radius-sm: 8px;
            --trunk-radius: 16px;
            --trunk-radius-lg: 24px;
            --trunk-shadow-sm: 0 4px 12px rgba(0, 0, 0, 0.5);
            --trunk-shadow-md: 0 12px 32px rgba(0, 0, 0, 0.6);
            --trunk-shadow-glow: 0 0 30px rgba(226, 192, 141, 0.08);

            /* Typography */
            --font-display: 'Playfair Display', serif;
            --font-body: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
        }

        * {
            box-sizing: border-box;
        }

        body {
            background-color: var(--trunk-bg);
            background-image:
                radial-gradient(circle at 50% -10%, rgba(226, 192, 141, 0.07) 0%, transparent 40%),
                radial-gradient(circle at 100% 60%, rgba(147, 197, 253, 0.02) 0%, transparent 40%),
                radial-gradient(circle at 0% 100%, rgba(134, 239, 172, 0.01) 0%, transparent 40%);
            background-attachment: fixed;
            color: var(--trunk-text-primary);
            min-height: 100vh;
            font-family: var(--font-body);
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            margin: 0;
            line-height: 1.6;
        }

        /* ── Navigation ────────────────────────────────────────── */
        nav.container-fluid {
            background: rgba(5, 5, 7, 0.7);
            backdrop-filter: blur(20px) saturate(150%);
            -webkit-backdrop-filter: blur(20px) saturate(150%);
            border-bottom: 1px solid var(--trunk-border);
            padding: 1.25rem 3rem;
            position: sticky;
            top: 0;
            z-index: 100;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.5);
        }

        .nav-brand {
            font-family: var(--font-display);
            font-weight: 600;
            font-size: 1.6rem;
            color: var(--trunk-accent) !important;
            text-decoration: none;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .nav-brand span {
            font-weight: 400;
            color: var(--trunk-text-secondary);
        }

        nav ul {
            display: flex;
            gap: 0.5rem;
            list-style: none;
            margin: 0;
            padding: 0;
            align-items: center;
        }

        nav ul li a {
            color: var(--trunk-text-secondary) !important;
            text-decoration: none;
            font-weight: 500;
            font-size: 0.85rem;
            padding: 0.6rem 1.2rem;
            border-radius: 30px;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1.5px;
        }

        nav ul li a:hover,
        nav ul li a.active {
            color: var(--trunk-text-primary) !important;
            background: var(--trunk-accent-subtle);
            box-shadow: inset 0 0 0 1px var(--trunk-border-glow);
        }

        /* ── Main Content ──────────────────────────────────────── */
        main.container {
            padding: 4rem 2rem;
            max-width: 1280px;
            margin: 0 auto;
        }

        /* ── Page Header ───────────────────────────────────────── */
        .page-header {
            text-align: center;
            margin-bottom: 4rem;
        }

        .page-header h1 {
            font-family: var(--font-display);
            font-size: 3.5rem;
            font-weight: 500;
            color: var(--trunk-text-primary);
            margin-bottom: 1rem;
            letter-spacing: -0.5px;
            background: linear-gradient(180deg, #FFFFFF 0%, #A1A1AA 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .page-header p {
            color: var(--trunk-text-secondary);
            font-size: 1.15rem;
            font-weight: 300;
            max-width: 600px;
            margin: 0 auto;
            letter-spacing: 0.5px;
        }

        /* ── Cards ─────────────────────────────────────────────── */
        .card {
            background: var(--trunk-bg-secondary);
            border: 1px solid var(--trunk-border);
            border-radius: var(--trunk-radius);
            padding: 2rem;
            box-shadow: var(--trunk-shadow-sm);
            transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1), box-shadow 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .card:hover {
            transform: translateY(-4px);
            box-shadow: var(--trunk-shadow-md), var(--trunk-shadow-glow);
            border-color: rgba(226, 192, 141, 0.15);
        }

        .card-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 1.5rem;
        }

        /* ── Outfit Cards ──────────────────────────────────────── */
        .outfit-section {
            margin-bottom: 5rem;
            background: var(--trunk-bg-secondary);
            border: 1px solid var(--trunk-border);
            border-radius: var(--trunk-radius-lg);
            padding: 2.5rem;
            box-shadow: var(--trunk-shadow-sm);
            position: relative;
            overflow: hidden;
        }

        .outfit-section::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--trunk-accent-glow), transparent);
            opacity: 0.5;
        }

        .outfit-title {
            font-family: var(--font-display);
            font-size: 2rem;
            margin-bottom: 1.5rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid var(--trunk-border);
            display: flex;
            align-items: center;
            gap: 1rem;
            font-weight: 500;
        }

        .outfit-title .outfit-number {
            background: var(--trunk-accent-subtle);
            color: var(--trunk-accent);
            width: 44px;
            height: 44px;
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-family: var(--font-body);
            font-weight: 500;
            font-size: 1.1rem;
            border: 1px solid var(--trunk-border-glow);
        }

        .wildcard-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            background: var(--trunk-wildcard-bg);
            color: var(--trunk-wildcard);
            border: 1px solid rgba(255, 143, 143, 0.2);
            padding: 0.4rem 1rem;
            border-radius: 30px;
            font-size: 0.75rem;
            font-weight: 600;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .outfit-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 2rem;
        }

        /* ── Product Item Card ─────────────────────────────────── */
        .item-card {
            background: var(--trunk-bg-tertiary);
            border: 1px solid var(--trunk-border);
            border-radius: var(--trunk-radius);
            overflow: hidden;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            display: flex;
            flex-direction: column;
        }

        .item-card:hover {
            border-color: rgba(226, 192, 141, 0.3);
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.8), var(--trunk-shadow-glow);
            transform: translateY(-6px);
        }

        .item-card.wildcard {
            border-color: rgba(255, 143, 143, 0.2);
        }

        .item-card.wildcard:hover {
            border-color: rgba(255, 143, 143, 0.5);
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.8), 0 0 30px rgba(255, 143, 143, 0.1);
        }

        .item-image-container {
            width: 100%;
            height: 280px;
            background: #FFFFFF;
            position: relative;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }

        .item-image {
            width: 100%;
            height: 100%;
            object-fit: contain;
            transition: transform 0.5s ease;
        }

        .item-card:hover .item-image {
            transform: scale(1.05);
        }

        .item-image-placeholder {
            width: 100%;
            height: 280px;
            background: var(--trunk-bg-tertiary);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--trunk-text-tertiary);
            font-size: 3rem;
        }

        .item-body {
            padding: 1.5rem;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
        }

        .item-brand {
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--trunk-accent);
            margin-bottom: 0.5rem;
        }

        .item-name {
            font-weight: 400;
            font-size: 1.1rem;
            margin-bottom: 0.75rem;
            color: var(--trunk-text-primary);
            line-height: 1.4;
        }

        .item-meta {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 1rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid var(--trunk-border);
        }

        .item-price {
            font-family: var(--font-display);
            font-style: italic;
            font-size: 1.3rem;
            color: var(--trunk-text-primary);
        }

        .item-retailer {
            font-size: 0.8rem;
            color: var(--trunk-text-secondary);
            font-weight: 500;
        }

        .item-tags {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
            margin-bottom: 1rem;
        }

        .item-tag {
            font-size: 0.7rem;
            padding: 0.3rem 0.6rem;
            border-radius: 4px;
            background: var(--trunk-bg);
            color: var(--trunk-text-secondary);
            border: 1px solid var(--trunk-border);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .item-note {
            font-size: 0.85rem;
            color: var(--trunk-text-secondary);
            line-height: 1.6;
            margin-bottom: 1rem;
            background: var(--trunk-bg);
            padding: 0.75rem 1rem;
            border-radius: var(--trunk-radius-sm);
            border-left: 2px solid var(--trunk-accent);
        }

        /* ── Action Buttons ────────────────────────────────────── */
        .item-actions {
            margin-top: auto;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.75rem;
        }

        .btn {
            padding: 0.75rem 1rem;
            border: none;
            border-radius: var(--trunk-radius-sm);
            font-weight: 500;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: center;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-family: var(--font-body);
        }

        .btn-purchase {
            background: var(--trunk-text-primary);
            color: var(--trunk-bg);
            grid-column: 1 / -1;
        }

        .btn-purchase:hover {
            background: var(--trunk-accent);
            transform: translateY(-2px);
            box-shadow: 0 8px 16px rgba(226, 192, 141, 0.2);
        }

        .btn-skip,
        .btn-dislike {
            background: transparent;
            color: var(--trunk-text-secondary);
            border: 1px solid var(--trunk-text-tertiary);
        }

        .btn-skip:hover,
        .btn-dislike:hover {
            border-color: var(--trunk-text-primary);
            color: var(--trunk-text-primary);
        }

        .btn-dislike {
            flex: 0 0 auto;
        }

        .btn-return {
            background: transparent;
            color: var(--trunk-return);
            border: 1px solid rgba(226, 192, 141, 0.4);
        }

        .btn-return:hover {
            background: rgba(226, 192, 141, 0.1);
        }

        .btn-undo {
            background: transparent;
            color: var(--trunk-text-secondary);
            border: 1px solid var(--trunk-border);
        }

        .btn-view-details {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            margin: 0.5rem 0 1rem;
            font-size: 0.85rem;
            font-weight: 500;
            color: var(--trunk-accent);
            text-decoration: none;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-view-details:hover {
            color: var(--trunk-accent-hover);
            transform: translateX(4px);
        }

        .btn-generate {
            background: var(--trunk-text-primary);
            color: var(--trunk-bg);
            font-weight: 500;
            padding: 1rem 3rem;
            border-radius: 30px;
            font-size: 1rem;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            border: none;
            cursor: pointer;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 0.75rem;
        }

        .btn-generate:hover {
            background: var(--trunk-accent);
            box-shadow: 0 10px 30px rgba(226, 192, 141, 0.25);
            transform: translateY(-2px);
        }

        .btn-generate-new {
            background: transparent;
            color: var(--trunk-accent);
            border: 1px solid rgba(226, 192, 141, 0.3);
            padding: 0.6rem 1.5rem;
            border-radius: 30px;
            font-size: 0.8rem;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-generate-new:hover {
            background: var(--trunk-accent-subtle);
            border-color: var(--trunk-accent);
            color: var(--trunk-text-primary);
        }

        /* ── Decision Badges ───────────────────────────────────── */
        .decision-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.4rem 0.8rem;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 1rem;
            width: 100%;
            justify-content: center;
            border: 1px solid transparent;
        }

        .decision-purchased {
            background: rgba(147, 197, 253, 0.1);
            color: var(--trunk-purchase);
            border-color: rgba(147, 197, 253, 0.2);
        }

        .decision-skipped {
            background: rgba(113, 113, 122, 0.1);
            color: var(--trunk-skip);
            border-color: rgba(113, 113, 122, 0.2);
        }

        .decision-returned {
            background: rgba(226, 192, 141, 0.1);
            color: var(--trunk-return);
            border-color: rgba(226, 192, 141, 0.2);
        }

        /* ── Forms ─────────────────────────────────────────────── */
        form label {
            font-weight: 500;
            color: var(--trunk-text-secondary);
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            display: block;
            margin-bottom: 0.5rem;
        }

        form input,
        form select,
        form textarea {
            background: var(--trunk-bg-tertiary) !important;
            border: 1px solid var(--trunk-border) !important;
            border-radius: var(--trunk-radius-sm) !important;
            color: var(--trunk-text-primary) !important;
            padding: 0.75rem 1rem !important;
            transition: all 0.3s ease !important;
            font-family: var(--font-body) !important;
        }

        form input:focus,
        form select:focus,
        form textarea:focus {
            border-color: var(--trunk-accent) !important;
            box-shadow: 0 0 0 4px var(--trunk-accent-glow) !important;
            outline: none !important;
        }

        .form-section {
            background: var(--trunk-bg-secondary);
            border: 1px solid var(--trunk-border);
            border-radius: var(--trunk-radius-lg);
            padding: 2.5rem;
            margin-bottom: 2rem;
            position: relative;
        }

        .form-section h3 {
            font-family: var(--font-display);
            font-size: 1.5rem;
            margin-bottom: 2rem;
            color: var(--trunk-text-primary);
            font-weight: 500;
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 1.5rem;
        }

        /* ── History Table ─────────────────────────────────────── */
        .history-card {
            background: var(--trunk-bg-secondary);
            border: 1px solid var(--trunk-border);
            border-radius: var(--trunk-radius);
            padding: 1.5rem 2rem;
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            transition: all 0.3s ease;
        }

        .history-card:hover {
            border-color: rgba(226, 192, 141, 0.2);
            transform: translateX(8px);
            background: var(--trunk-bg-tertiary);
        }

        .history-info h3 {
            margin-bottom: 0.4rem;
            font-size: 1.25rem;
            font-family: var(--font-display);
        }

        .history-meta {
            color: var(--trunk-text-secondary);
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .status-badge {
            padding: 0.4rem 1rem;
            border-radius: 30px;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            border: 1px solid transparent;
        }

        .status-pending {
            background: rgba(226, 192, 141, 0.1);
            color: var(--trunk-accent);
            border-color: rgba(226, 192, 141, 0.2);
        }

        .status-reviewed {
            background: rgba(134, 239, 172, 0.1);
            color: var(--trunk-keep);
            border-color: rgba(134, 239, 172, 0.2);
        }

        /* ── Empty State ───────────────────────────────────────── */
        .empty-state {
            text-align: center;
            padding: 6rem 2rem;
            background: var(--trunk-bg-secondary);
            border: 1px solid var(--trunk-border);
            border-radius: var(--trunk-radius-lg);
            max-width: 800px;
            margin: 0 auto;
        }

        .empty-state .icon {
            margin-bottom: 2rem;
            color: var(--trunk-accent);
        }

        .empty-state h2 {
            font-family: var(--font-display);
            font-size: 2.5rem;
            margin-bottom: 1rem;
            font-weight: 500;
        }

        .empty-state p {
            color: var(--trunk-text-secondary);
            margin-bottom: 2.5rem;
            font-size: 1.1rem;
            max-width: 500px;
            margin-left: auto;
            margin-right: auto;
            line-height: 1.6;
        }

        /* ── Stylist Brief ─────────────────────────────────────── */
        .stylist-brief {
            background: var(--trunk-bg-secondary);
            border: 1px solid rgba(226, 192, 141, 0.15);
            border-radius: var(--trunk-radius-lg);
            padding: 2rem 3rem;
            margin-bottom: 3rem;
            font-size: 1.1rem;
            color: var(--trunk-text-primary);
            line-height: 1.8;
            position: relative;
            box-shadow: var(--trunk-shadow-sm);
        }

        .stylist-brief::before {
            content: '❝';
            font-family: var(--font-display);
            font-size: 4rem;
            color: var(--trunk-accent);
            position: absolute;
            top: 0.5rem;
            left: 1rem;
            opacity: 0.2;
            line-height: 1;
        }

        .stylist-brief p {
            position: relative;
            z-index: 1;
            margin: 0;
            font-family: var(--font-display);
            font-style: italic;
        }

        /* ── Loading / Generating State ────────────────────────── */
        .generating {
            text-align: center;
            padding: 5rem 2rem;
            background: var(--trunk-bg-secondary);
            border: 1px solid var(--trunk-border);
            border-radius: var(--trunk-radius-lg);
            max-width: 800px;
            margin: 0 auto;
        }

        .generating h3 {
            font-family: var(--font-display);
            font-size: 1.8rem;
            margin-bottom: 0.5rem;
        }

        .spinner {
            width: 56px;
            height: 56px;
            border: 2px solid rgba(226, 192, 141, 0.1);
            border-top-color: var(--trunk-accent);
            border-radius: 50%;
            animation: spin 1s cubic-bezier(0.6, 0.1, 0.4, 0.9) infinite;
            margin: 0 auto 2rem;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* ── Fade-in Animation ─────────────────────────────────── */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px) scale(0.98);
            }

            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .fade-in {
            animation: fadeInUp 0.7s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        .fade-in:nth-child(2) {
            animation-delay: 0.1s;
        }

        .fade-in:nth-child(3) {
            animation-delay: 0.2s;
        }

        .fade-in:nth-child(4) {
            animation-delay: 0.3s;
        }

        .fade-in:nth-child(5) {
            animation-delay: 0.4s;
        }

        /* ── Responsive ────────────────────────────────────────── */
        @media (max-width: 768px) {
            nav.container-fluid {
                padding: 1rem 1.5rem;
