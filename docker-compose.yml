services:
  outfitd:
    build: .
    container_name: outfitd
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - trunk-data:/app/data
      - trunk-uploads:/app/src/static/uploads
      - ./src:/app/src
      - ./scripts:/app/scripts
    environment:
      - DATABASE_URL=sqlite:///./data/trunk.db

volumes:
  trunk-data:
  trunk-uploads:
